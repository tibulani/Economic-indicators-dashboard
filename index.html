<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA Economic Indicators</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1> South Africa Economic Dashboard</h1>
        <H3>Key indicators from Stats SA</H3>
    </header>
    <section class="card-container">
        <div class="card">
            <h3>Unemployment</h3>
            <p id="unemployment-value">25%</p>
            <small>4th Q 2026</small>
        </div>

        <div class="card">
            <h3>Inflation</h3>
            <p id="CPI-value">2%</p>
            <small>4th Q 2026</small>
        </div>

        <div class="card">
            <h3>GDP</h3>
            <p id="GDP-value">25%</p>
            <small>4th Q 2026</small>
        </div>
    </section>

     <section class="chart-container">
        <div class="container">
            <h3>Unemployment Trend (Chart)</h3>
            <canvas id="unemployment-chart"></canvas>
        </div>

        <div class="container">
            <h3>Inflation Trend (Chart)</h3>
            <canvas id="inflation-chart"></canvas>
        </div>

        <div class="container">
            <h3>GDP Trend (Chart)</h3>
            <canvas id="GDP-chart"></canvas>
        </div>
     </section>
     <script src="script.js"></script>
</body>
</html>
